            content: 外代数的定义、外代数作为分次代数、外代数的维数 2^n
        - wedge_product:
            title: 楔积
            content: 楔积的定义、楔积的性质
        - basis_of_exterior_form:
            title: 外形式的基
            content: 外形式的基的定义、外形式的基的性质
        - hodge_star_operator:
            title: Hodge 星算子
            content: Hodge 星算子的定义、Hodge 星算子的性质
        - inner_product_of_exterior_form:
            title: 外形式的内积
            content: 外形式的内积的定义、外形式的内积的性质
        - cross_product_in_3d_space:
            title: 三维欧式空间中的叉积
            content: 三维欧氏空间的向量外积、三维欧氏空间的向量外积与叉积的关系、叉乘与行列式的几何意义