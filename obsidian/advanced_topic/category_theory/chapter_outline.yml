category_theory:
  title: 范畴论
  sections:
    - category_and_functor:
        title: 范畴与函子
        subsections:
          - definition_of_category:
              title: 范畴的定义
              content: 范畴的定义、范畴的例子（集合范畴、群范畴、拓扑空间范畴、向量空间范畴、前序集范畴）、态射同构
          - size_of_category:
              title: 范畴的大小
              content: 大范畴/小范畴/局部小范畴、例子
          - subcategory:
              title: 子范畴
              content: 子范畴、满子范畴、子范畴的例子
          - opposite_category:
              title: 对偶范畴（逆范畴）
              content: 对偶范畴的定义、对偶范畴的例子、对偶原理
          - monomorphism_and_epimorphism:
              title: 单态射与满态射
              content: 单态射、满态射、双态射
          - special_objects:
              title: 特殊对象
              content: 初对象、终对象、零对象
          - definition_of_functor:
              title: 函子的定义
              content: 函子的定义、函子的例子、反变函子、局部单的函子、局部满的函子
          - properties_of_functor:
              title: 函子的性质
              content: 忠实函子、满函子、全忠实函子、本质满函子、保持与反射性质、范畴的同构
    - natural_transformation:
        title: 自然变换
        subsections:
          - definition_of_natural_transformation:
              title: 自然变换的定义
              content: 自然变换的定义、自然性方块、自然变换的性质、自然变换的例子
          - natural_isomorphism:
              title: 自然同构
              content: 自然同构的定义、逐分量同构判定、自然同构的例子（双对偶、行列式）
          - functor_category:
              title: 函子范畴
              content: 函子范畴的定义、对象为函子、态射为自然变换、函子范畴的例子
          - composition_of_natural_transformation:
              title: 自然变换的复合
              content: 垂直复合、水平复合（Godement 乘积）、whiskering、交换律（interchange law）
          - equivalence_of_categories:
              title: 范畴的等价
              content: 范畴等价的定义、全忠实加本质满的判定、对偶等价、骨架范畴
          - two_category:
              title: 2-范畴初步
              content: 2-范畴的定义、Cat 作为 2-范畴
    - universal_property_and_representable:
        title: 泛性质与可表函子
        subsections:
          - universal_property:
              title: 泛性质
              content: 泛性质的定义、泛态射、泛元素、由泛性质刻画对象的唯一性（同构意义下）
          - comma_category:
              title: 逗号范畴
              content: 逗号范畴的定义、切片范畴与余切片范畴、泛态射的统一描述
          - representable_functor:
              title: 可表函子
              content: Hom 函子 Hom(A, -)、Hom(-, A)、可表函子、表示对象、泛元素
    - yoneda_lemma:
        title: Yoneda 引理
        subsections:
          - statement_of_yoneda_lemma:
              title: Yoneda 引理的叙述与证明
              content: Yoneda 引理的叙述、自然变换 Nat(Hom(A,-), F) ≅ F(A)、证明
          - yoneda_embedding:
              title: Yoneda 嵌入
              content: Yoneda 嵌入 C → [C^op, Set] 的全忠实性、预层范畴、小范畴的嵌入定理
          - density_and_consequences:
              title: 稠密性与推论
              content: 米田观点（"对象由其关系决定"）、可表函子的唯一性、泛性质的统一刻画
    - limit_and_colimit:
        title: 极限与余极限
        subsections:
          - diagram_and_cone:
              title: 图表、锥与余锥
              content: 指标范畴、图表（diagram）、锥（cone）、余锥（cocone）的定义
          - limit:
              title: 极限
              content: 极限作为泛锥（terminal cone）、极限的唯一性（同构意义下）
          - colimit:
              title: 余极限
              content: 余极限作为始余锥、与极限的对偶关系
          - product_and_coproduct:
              title: 积与余积
              content: 积、余积作为离散图表的极限/余极限、例子（集合、群、拓扑空间、模）
          - equalizer_and_coequalizer:
              title: 等化子与余等化子
              content: 等化子、余等化子的定义、与单/满态射的关系
          - pullback_and_pushout:
              title: 拉回与推出
              content: 拉回（纤维积）、推出（纤维余积）、拉回粘合引理（pasting lemma）、例子
          - completeness:
              title: (余)完备性
              content: 完备范畴、余完备范畴、极限由积与等化子构造、有限极限由终对象与拉回构造
          - filtered_colimit:
              title: 滤过余极限
              content: 滤过范畴、滤过余极限、有向余极限、与有限极限的交换、紧对象（可选）
          - preservation_of_limits:
              title: 极限的保持、反射与创建
              content: 保持极限、反射极限、创建极限的函子、连续函子、余连续函子
    - adjoint_functor:
        title: 伴随函子
        subsections:
          - definition_of_adjoint_functor:
              title: 伴随函子的定义
              content: 通过 Hom 集自然同构定义伴随 Hom(FX, Y) ≅ Hom(X, GY)、左伴随、右伴随
          - unit_and_counit:
              title: 单位与余单位
              content: 单位 η、余单位 ε、三角恒等式（zigzag identities）、与 Hom 定义的等价
          - examples_of_adjunction:
              title: 伴随的例子
              content: 自由-遗忘伴随、积与对角函子、张量-Hom 伴随、离散-忘却
          - uniqueness_of_adjoint:
              title: 伴随的唯一性
              content: 伴随在自然同构意义下唯一
          - adjoint_and_limit:
              title: 伴随与极限
              content: 右伴随保持极限（RAPL）、左伴随保持余极限（LAPC）
          - reflective_subcategory:
              title: 反射子范畴与局部化
              content: 反射子范畴、反射函子、余反射子范畴、范畴的局部化简介
          - adjoint_functor_theorem:
              title: 伴随函子定理
              content: 一般伴随函子定理（GAFT）、解集条件、特殊伴随函子定理（SAFT）
    - kan_extension:
        title: Kan 扩张
        subsections:
          - definition_of_kan_extension:
              title: Kan 扩张的定义
              content: 左 Kan 扩张 Lan_K F、右 Kan 扩张 Ran_K F 的定义、泛性质、单位与余单位、Kan 扩张的唯一性（同构意义下）
          - pointwise_kan_extension:
              title: 逐点 Kan 扩张
              content: 通过余极限的左 Kan 扩张公式 (Lan_K F)(d) = colim_{(c, K c → d)} F(c)、通过极限的右 Kan 扩张公式、逐点性的判定、存在性条件
          - kan_extension_as_adjoint:
              title: Kan 扩张作为伴随
              content: 沿 K 的限制函子 K^* 的左右伴随 Lan_K ⊣ K^* ⊣ Ran_K、与 §6 伴随理论的统一视角、Kan 扩张沿全忠实函子是扩张
          - examples_of_kan_extension:
              title: Kan 扩张的例子
              content: 极限/余极限作为沿 C → 1 的 Kan 扩张、伴随作为单位/终对象的 Kan 扩张、Yoneda 嵌入的 Kan 扩张、自由(余)完备化
          - density_and_universality:
              title: 密度定理与"一切皆 Kan 扩张"
              content: 密度定理（任何函子是其在表示函子上的 Kan 扩张）、米田引理的 Kan 扩张解读、Mac Lane 名言 "All concepts are Kan extensions"
    - monad_and_algebra:
        title: 单子与代数
        subsections:
          - definition_of_monad:
              title: 单子与余单子的定义
              content: 单子 (T, η, μ) 的定义、单子律、余单子的定义、由伴随诱导的单子
          - algebra_over_monad:
              title: 单子的代数
              content: T-代数、Eilenberg–Moore 范畴、Kleisli 范畴、自由代数
          - monadicity:
              title: 单子性
              content: 比较函子、Beck 单子性定理、单子性的应用（代数范畴的刻画）
    - monoidal_category:
        title: 幺半范畴
        subsections:
          - definition_of_monoidal_category:
              title: 幺半范畴的定义
              content: 幺半范畴、张量积、单位对象、结合子与单位子、Mac Lane 相干定理
          - braided_and_symmetric:
              title: 辫子与对称幺半范畴
              content: 辫子幺半范畴、对称幺半范畴、例子（向量空间张量积、集合积）
          - monoid_object:
              title: 幺半范畴中的幺半群对象
              content: 幺半群对象、余幺半群对象、Hopf 代数初步、群对象
          - closed_monoidal_category:
              title: 闭幺半范畴
              content: 内部 Hom 对象、张量-Hom 伴随 (- ⊗ X) ⊣ [X, -]、对称闭幺半范畴、笛卡尔闭范畴作为特例、例子（向量空间、Set）
          - enriched_category:
              title: 丰富范畴
              content: 丰富范畴的定义、Ab-丰富、Set-丰富、丰富函子、与预加法范畴的联系
    - additive_category_and_abelian_category:
        title: 加法范畴与阿贝尔范畴
        subsections:
          - preadditive_category:
              title: 预加法范畴
              content: 预加法范畴的定义、例子
          - additive_category:
              title: 加法范畴
              content: 加法范畴的定义、零对象、双积（biproduct）、有限积与余积的重合
          - kernel_and_cokernel:
              title: 核与余核
              content: 核、余核作为(余)等化子、像（image）、余像（coimage）
          - abelian_category:
              title: 阿贝尔范畴
              content: 阿贝尔范畴的定义、单/满态射的正规性、典范分解、例子（R-模范畴、阿贝尔群范畴、层范畴）
          - exact_sequence:
              title: 正合列
              content: 正合列、短正合列、五引理、蛇形引理、九引理
          - embedding_theorem:
              title: 嵌入定理
              content: Freyd–Mitchell 嵌入定理、图追踪法（diagram chasing）的合法性
    - sheaf_theory:
        title: 层与层范畴
        subsections:
          - presheaf:
              title: 预层
              content: 开集范畴 O(X)、预层作为反变函子 O(X)^op → Set、截面、限制态射、预层范畴
          - stalk_and_germ:
              title: 茎与芽
              content: 点上的茎（stalk）作为滤过余极限、芽（germ）、茎反映局部性质
          - sheaf:
              title: 层
              content: 分离性公理与黏合公理、层的定义、层与预层的对比、例子（连续函数层、常值层）
          - sheafification:
              title: 层化
              content: 层化函子、层化作为包含函子的左伴随、伴随 Sh(X) ⇄ PSh(X)
          - morphism_of_sheaves:
              title: 层的态射与层范畴
              content: 层之间的态射、层范畴 Sh(X)、阿贝尔层范畴、核与像的层化、(余)极限
          - direct_and_inverse_image:
              title: 正像与逆像
              content: 连续映射诱导的正像 f_*、逆像 f^{-1}、伴随 f^{-1} ⊣ f_*、几何态射的雏形
    - categorical_logic:
        title: 范畴逻辑
        subsections:
          - cartesian_closed_category:
              title: 笛卡尔闭范畴
              content: 笛卡尔闭范畴 (CCC)、指数对象、求值与 curry 化、积-指数伴随、例子（Set、预层范畴）
          - curry_howard_lambek_correspondence:
              title: Curry–Howard–Lambek 对应
              content: 命题↔类型↔对象、证明↔程序↔态射、简单类型 λ 演算与 CCC 的等价；关联数理逻辑·类型论
          - quantifiers_as_adjoints:
              title: 量词作为伴随
              content: Lawvere 洞见、代入函子、存在量词 ∃ 为左伴随、全称量词 ∀ 为右伴随、超doctrine；关联数理逻辑·一阶逻辑
          - functorial_semantics:
              title: 函子语义
              content: Lawvere 理论（代数理论）、模型作为保积函子、理论范畴与模型范畴；关联数理逻辑·模型论与泛代数
          - internal_language:
              title: 内部语言
              content: 范畴的内部语言、Mitchell–Bénabou 语言、Kripke–Joyal 语义、内蕴地做数学
    - topos_theory:
        title: 拓扑斯理论
        subsections:
          - subobject_and_classifier:
              title: 子对象与子对象分类子
              content: 子对象、子对象格、子对象分类子 Ω、真值态射 true、特征态射、Set 中 Ω = {⊤, ⊥}
          - elementary_topos:
              title: 初等拓扑斯
              content: 初等拓扑斯的定义（有限极限 + 笛卡尔闭 + 子对象分类子）、例子（Set、G-集、预层拓扑斯）
          - heyting_algebra_and_intuitionistic_logic:
              title: Heyting 代数与直觉主义逻辑
              content: Heyting 代数、子对象格的 Heyting 结构、拓扑斯内蕴逻辑为直觉主义逻辑；关联数理逻辑·直觉主义
          - grothendieck_topology_and_site:
              title: Grothendieck 拓扑与景
              content: 筛、Grothendieck 拓扑、景（site）、景上的层、Grothendieck 拓扑斯（推广层范畴）
          - geometric_morphism:
              title: 几何态射
              content: 几何态射、逆像与正像函子、拓扑斯的点、拓扑斯之间的态射
          - classifying_topos:
              title: 分类拓扑斯
              content: 几何理论、分类拓扑斯、泛模型、与函子语义的呼应