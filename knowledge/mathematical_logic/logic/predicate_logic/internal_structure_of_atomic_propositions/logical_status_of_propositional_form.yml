logic.logical_status_of_propositional_form:
  name: 命题形式的逻辑状态
  type: concept
  part: mathematical_logic
  chapter: logic
  section: predicate_logic
  subsection: internal_structure_of_atomic_propositions
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 114
      parts: 第五章 谓词逻辑 / 第一节 原子命题的内部结构 / 四、命题形式及其解释
      role: main
  latex: |
    一个命题形式若在任一解释下都得到真命题，则为普遍有效式；若至少在一种解释下得到真命题，则为可满足式；若在任一解释下都得不到真命题，则为不可满足式。普遍有效的真值形式就是重言式。
  dependent_keypoints:
    - logic.interpretation_of_propositional_form
  related_keypoints:
