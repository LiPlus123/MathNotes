logic.restriction_and_generalization_of_concepts:
  name: 概念的限制和概括
  type: concept
  part: mathematical_logic
  chapter: logic
  section: concepts
  subsection: generalization_and_restriction
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 20-21
      parts: 第二章 概念 / 第六节 概括和限制 / 二、限制; 三、概括
