  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 9-11
      parts: 第二章 概念 / 第一节 内涵和外延 / 一、反映对象本质属性的思维形式; 二、内涵和外延
      role: main
  notes_for_extraction: 只围绕“内涵”和“外延”的基础定义展开，不延伸到划分与概括方法。
kinds_of_concepts:
  description: 区分普遍、单独、空概念，以及实体、属性、集合与非集合概念。
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 11-12
      parts: 第二章 概念 / 第二节 概念的种类 / 一、普遍概念、单独概念和空概念; 二、实体概念和属性概念; 三、集合概念和非集合概念
      role: main
  notes_for_extraction: 以概念分类标准为中心，不展开具体例证。
relations_of_concepts:
  description: 说明概念之间的相容与不相容关系，为后续概念划分和推理作铺垫。
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
