      parts: 第二章 概念 / 第三节 概念的关系 / 一、相容关系; 二、不相容关系
      role: main
  notes_for_extraction: 只保留关系分类和边界，不引入集合论或图示法。
definition_of_concepts:
  description: 说明概念陈述、定义结构、定义方法与定义规则，并区分语词定义。
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 15-18
      parts: 第二章 概念 / 第四节 概念的定义 / 一、概念陈述及其恰当性; 二、定义的结构和方法; 三、定义的规则; 四、语词定义
      role: main
