    命题推理是依据命题之间的逻辑关系进行的推理。在这种推理中，原子命题被视为最基本单位而不再分析其内部结构；其推理形式由命题变项和联结词构成，一命题推理有效，当且仅当其对应的蕴涵式是重言式。
