  latex: |
    归谬赋值法是假设待判定的蕴涵式前件真而后件假，并据此逐步给命题变项赋值；若赋值过程中必然出现同一变项既真又假的矛盾赋值，则原式是重言式，否则便存在反例赋值，原式不是重言式。
