logic.disjunctive_inference:
  name: 选言推理
  type: concept
  part: mathematical_logic
  chapter: logic
  section: propositional_logic
  subsection: propositional_inference
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 46-49
      parts: 第三章 命题逻辑 / 第二节 命题推理 / 二、几种基本的命题推理 / （二）选言推理
      role: main
  latex: |
    选言推理是以前提中含有选言命题并依据其逻辑性质进行的推理。相容选言推理中，否定一部分选言支可以肯定另一部分，而肯定一部分不能否定另一部分；不相容选言推理中，否定肯定式和肯定否定式都可以成立。
  dependent_keypoints:
    - logic.propositional_inference
    - logic.inclusive_disjunction_proposition
    - logic.exclusive_disjunction_proposition
  related_keypoints:
