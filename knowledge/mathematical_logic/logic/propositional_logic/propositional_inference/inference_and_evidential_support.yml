logic.inference_and_evidential_support:
  name: 推理与证据支持度
  type: concept
  part: mathematical_logic
  chapter: logic
  section: propositional_logic
  subsection: propositional_inference
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 42-43
      parts: 第三章 命题逻辑 / 第二节 命题推理 / 一、推理概述 / （一）什么是推理
      role: main
  latex: |
    推理是由若干命题得出一个命题的思维过程，其中前提为结论提供证据支持。证据支持度刻画前提真对结论真所提供的保证程度；支持度达到 100% 的推理称为必然性推理，低于 100% 的则属于或然性推理。
