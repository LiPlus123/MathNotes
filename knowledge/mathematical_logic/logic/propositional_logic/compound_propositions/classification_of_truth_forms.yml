logic.classification_of_truth_forms:
  name: 真值形式的分类
  type: concept
  part: mathematical_logic
  chapter: logic
  section: propositional_logic
  subsection: compound_propositions
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 41
      parts: 第三章 命题逻辑 / 第一节 复合命题 / 四、一般复合命题及其真值形式 / （三）真值形式的判定
      role: main
  latex: |
    真值形式可分为三类：在任意赋值下都真的为重言式，在任意赋值下都假的为矛盾式，在至少一组赋值下为真但并非恒真的为非重言的可真式。判定任务就是确定给定真值形式属于这三类中的哪一类。
