  latex: |
    判断是对对象有所断定的思维形式；语句是判断的语言表达形式；表达判断并具有真假值的语句称为命题。并非一切语句都表达判断，同一判断可由不同语句表达，同一语句在不同语境下也可能表达不同判断。
