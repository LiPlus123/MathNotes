logic.truth_functional_compound_proposition:
  name: 真值函项意义下的复合命题
  type: concept
  part: mathematical_logic
  chapter: logic
  section: propositional_logic
  subsection: compound_propositions
  sources:
    - folder: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 31-32
      parts: 第三章 命题逻辑 / 第一节 复合命题 / 二、原子命题和复合命题
      role: main
  latex: |
    在命题逻辑中，复合命题必须同时满足两个条件：它包含与自身不同的命题作为支命题，并且它的真值由这些支命题的真值完全且唯一地确定。因此，命题逻辑研究的是具有真值函数性质的复合命题。
  dependent_keypoints:
    - logic.atomic_and_compound_propositions
  related_keypoints:
