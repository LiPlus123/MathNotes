compound_propositions:
  description: 说明判断、语句和命题的关系，区分原子命题、复合命题以及常见的联结方式和真值形式。
  sources:
    - path: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 30-41
      parts: 第三章 命题逻辑 / 第一节 复合命题 / 一、判断、语句和命题; 二、原子命题和复合命题; 三、几种基本的复合命题; 四、一般复合命题及其真值形式
      role: main
  notes_for_extraction: 以命题联结与真值结构为主，不提前写入推理规则。
propositional_inference:
  description: 说明命题推理的概念、基本推理形式，以及一般命题推理的判定思路。
  sources:
    - path: textbooks/mathematical_logic/logic/逻辑学-第3版-中国人民大学哲学院逻辑学教研室编-中国人民大学哲学院-20260517124112/
      pages: 42-62
      parts: 第三章 命题逻辑 / 第二节 命题推理 / 一、推理概述; 二、几种基本的命题推理; 三、一般命题推理及其判定
      role: main
  notes_for_extraction: 保持在推理形式与判定层面，不写具体证明步骤。