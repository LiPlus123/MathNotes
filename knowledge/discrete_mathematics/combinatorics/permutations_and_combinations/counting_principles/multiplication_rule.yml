combinatorics.multiplication_rule:
  name: 乘法原则
  type: definition
  subsection: counting_principles
  latex: |
    设 $S_1,S_2,\cdots,S_n$ 是有限集，从这些集合中依次选择一个元素的方式数有：
    \begin{equation}
        \Big| \prod_{i=1}^n S_i \Big| = \prod_{i=1}^n |S_i|
        \label{eq:combinatorics.multiplication_rule}
    \end{equation}
  dependent_keypoints:
  related_keypoints:
